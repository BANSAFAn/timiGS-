name: Release

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: 📦 Release Please
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
  build-desktop:
    name: 🖥️ Desktop (${{ matrix.name }})
    needs: release-please
    if: |
      always() &&
      (needs.release-please.result == 'success' || needs.release-please.result == 'skipped')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            name: macOS
          - platform: ubuntu-latest
            container: alpine:latest
            args: ""
            name: Linux
          - platform: windows-latest
            args: ""
            name: Windows

    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Alpine)
        if: matrix.container == 'alpine:latest'
        run: |
          apk add --no-cache nodejs npm curl rust cargo git make musl-dev openssl-dev clang llvm webkit2gtk-4.1-dev gtk+3.0-dev libayatana-appindicator-dev librsvg-dev patchelf alsa-lib-dev xdg-utils gcompat libc6-compat


      - name: Setup Node.js
        if: matrix.container != 'alpine:latest'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        if: matrix.container != 'alpine:latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Rust (Alpine)
        if: matrix.container == 'alpine:latest'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        run: npm install

      - name: Patch version
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json'));
            const tag = '${{ needs.release-please.outputs.tag_name }}'.replace(/^v/, '');
            if (tag && /^\d+\.\d+\.\d+/.test(tag)) {
              conf.version = tag;
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
              console.log('Version patched to:', tag);
            } else {
              console.log('Using existing version:', conf.version);
            }
          "

      - name: Generate installer assets (Windows)
        if: matrix.platform == 'windows-latest'
        run: node scripts/generate-installer-assets.js

      - name: Prepare Windows Certificate
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          TIMIGS_SECRET: ${{ secrets.TIMIGSSECRET }}
        run: |
          if ([string]::IsNullOrEmpty($env:TIMIGS_SECRET)) {
              Write-Host "TIMIGSSECRET secret is empty or not set. Skipping certificate preparation."
              exit 0
          }
          $certDir = Join-Path $env:RUNNER_TEMP "certs"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          $pemPath = Join-Path $certDir "cert.pem"
          $pfxPath = Join-Path $certDir "cert.pfx"
          $pfxPassword = "timigs123"
          if ($env:TIMIGS_SECRET.StartsWith("-----BEGIN")) {
              if ($env:TIMIGS_SECRET -match "PRIVATE KEY") {
                  [System.IO.File]::WriteAllText($pemPath, $env:TIMIGS_SECRET)
                  Write-Host "PEM contains private key. Exporting to PFX using openssl..."
                  openssl pkcs12 -export -out $pfxPath -in $pemPath -passout "pass:$pfxPassword" -legacy
                  if ($LASTEXITCODE -ne 0 -or -not (Test-Path $pfxPath)) {
                      openssl pkcs12 -export -out $pfxPath -in $pemPath -passout "pass:$pfxPassword"
                  }
              } else {
                  Write-Host "PEM does not contain 'PRIVATE KEY'. Checking if it is a wrapped PFX..."
                  $lines = $env:TIMIGS_SECRET -split "`n"
                  $base64Body = ""
                  foreach ($line in $lines) {
                      $trimmed = $line.Trim()
                      if (-not $trimmed.StartsWith("-----")) {
                          $base64Body += $trimmed
                      }
                  }
                  try {
                      $bytes = [System.Convert]::FromBase64String($base64Body)
                      [System.IO.File]::WriteAllBytes($pfxPath, $bytes)
                      $certs = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2Collection
                      $pfxValid = $false
                      try {
                          $certs.Import($pfxPath, "", [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::DefaultKeySet)
                          $pfxPassword = ""
                          $pfxValid = $true
                      } catch {
                          try {
                              $certs.Import($pfxPath, "timigs123", [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::DefaultKeySet)
                              $pfxPassword = "timigs123"
                              $pfxValid = $true
                          } catch {}
                      }
                      if (-not $pfxValid) {
                          throw "Not a valid PFX file"
                      }
                      Write-Host "Verified: Wrapped PFX file successfully decoded!"
                  } catch {
                      Write-Error "PEM certificate does not contain a PRIVATE KEY, and is not a valid PFX file: $_"
                      exit 1
                  }
              }
          } else {
              Write-Host "Decoding base64 encoded PFX..."
              try {
                  $cleanSecret = $env:TIMIGS_SECRET.Replace("`r`n", "").Replace("`n", "").Replace(" ", "").Trim()
                  $bytes = [System.Convert]::FromBase64String($cleanSecret)
                  [System.IO.File]::WriteAllBytes($pfxPath, $bytes)
              } catch {
                  Write-Error "Failed to decode base64 PFX certificate: $_"
                  exit 1
              }
          }
          if (Test-Path $pfxPath) {
              Write-Host "Certificate prepared successfully at $pfxPath"
              Add-Content -Path $env:GITHUB_ENV -Value "TAURI_WINDOWS_PFX=$pfxPath" -Encoding utf8
              Add-Content -Path $env:GITHUB_ENV -Value "TAURI_WINDOWS_PFX_PASSWORD=$pfxPassword" -Encoding utf8
          } else {
              Write-Error "Failed to generate $pfxPath"
              exit 1
          }

      - name: Build Tauri app (release)
        if: needs.release-please.outputs.release_created == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          RUSTFLAGS: ${{ matrix.container == 'alpine:latest' && '-C target-feature=-crt-static' || '' }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: "TimiGS ${{ needs.release-please.outputs.tag_name }}"
          releaseBody: ${{ needs.release-please.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build Tauri app (dev / manual dispatch)
        if: needs.release-please.outputs.release_created != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          RUSTFLAGS: ${{ matrix.container == 'alpine:latest' && '-C target-feature=-crt-static' || '' }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: dev-${{ github.sha }}
          releaseName: "TimiGS Development Build (${{ github.sha }})"
          releaseBody: "Development build — not a stable release."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
