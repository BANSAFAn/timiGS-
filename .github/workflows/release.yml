name: Release

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: 📦 Release Please
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
  build-desktop:
    name: 🖥️ Desktop (${{ matrix.name }})
    needs: release-please
    if: |
      always() &&
      (needs.release-please.result == 'success' || needs.release-please.result == 'skipped')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            name: macOS
          - platform: ubuntu-latest
            container: alpine:latest
            args: "--bundles deb,rpm"
            name: Linux
          - platform: windows-latest
            args: ""
            name: Windows

    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Alpine)
        if: matrix.container == 'alpine:latest'
        run: |
          apk add --no-cache nodejs npm curl rust cargo git make musl-dev openssl-dev clang llvm webkit2gtk-4.1-dev gtk+3.0-dev libayatana-appindicator-dev librsvg-dev patchelf alsa-lib-dev xdg-utils gcompat libc6-compat


      - name: Setup Node.js
        if: matrix.container != 'alpine:latest'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        if: matrix.container != 'alpine:latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Rust (Alpine)
        if: matrix.container == 'alpine:latest'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        run: npm install

      - name: Patch version
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json'));
            const tag = '${{ needs.release-please.outputs.tag_name }}'.replace(/^v/, '');
            if (tag && /^\d+\.\d+\.\d+/.test(tag)) {
              conf.version = tag;
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
              console.log('Version patched to:', tag);
            } else {
              console.log('Using existing version:', conf.version);
            }
          "

      - name: Generate installer assets (Windows)
        if: matrix.platform == 'windows-latest'
        run: node scripts/generate-installer-assets.js



      - name: Build Tauri app (release)
        if: needs.release-please.outputs.release_created == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          RUSTFLAGS: ${{ matrix.container == 'alpine:latest' && '-C target-feature=-crt-static' || '' }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: "TimiGS ${{ needs.release-please.outputs.tag_name }}"
          releaseBody: ${{ needs.release-please.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build Tauri app (dev / manual dispatch)
        if: needs.release-please.outputs.release_created != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          RUSTFLAGS: ${{ matrix.container == 'alpine:latest' && '-C target-feature=-crt-static' || '' }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: dev-${{ github.sha }}
          releaseName: "TimiGS Development Build (${{ github.sha }})"
          releaseBody: "Development build — not a stable release."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
